[coverage:paths]
source =
  mosqlient
  */site-packages/mosqlient

[coverage:run]
branch = false
source =
  mosqlient
parallel = true

[coverage:report]
precision = 2
omit =
  mosqlient/__init__.py
  mosqlient/__main__.py
  tests/*
fail_under = 80
show_missing = true

[coverage:html]
directory = build/coverage

[coverage:json]
output = build/coverage.json
